<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteX AI Prototype</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-header {
            background: #25D366;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        #chat-box {
            height: 450px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #e5ddd5;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        .user-msg {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-msg {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        #input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }
        #send-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 18px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:hover {
            background: #1ebc5a;
        }
        .typing {
            font-style: italic;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">BiteX Assistant</div>
    <div id="chat-box">
        <div class="message bot-msg">Hi! I'm BiteX. How can I help you with your restaurant today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    
    // We maintain the history here so the AI remembers the conversation
    let chatHistory = [];

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Show user message in UI
        appendMessage(text, 'user-msg');
        userInput.value = '';
        
        // Show a temporary "typing..." indicator
        const typingId = appendMessage("Typing...", 'bot-msg typing');
        
        try {
            // 2. Send data to your local backend
            const response = await fetch('http://localhost:5000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userMessage: text,
                    chatHistory: chatHistory
                })
            });
            
            const data = await response.json();
            
            // Remove typing indicator
            document.getElementById(typingId).remove();
            
            // 3. Show bot reply in UI
            appendMessage(data.reply, 'bot-msg');
            
            // 4. Update the history array for the next message
            chatHistory.push({ role: 'user', content: text });
            chatHistory.push({ role: 'assistant', content: data.reply });
            
        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage("Server offline. Make sure node src/index.js is running!", 'bot-msg');
        }
    }

    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        
        // Generate a unique ID if it's the typing indicator so we can delete it easily
        if (className.includes('typing')) {
            msgDiv.id = 'typing-' + Date.now();
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        return msgDiv.id;
    }

    // Allow pressing "Enter" to send
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
